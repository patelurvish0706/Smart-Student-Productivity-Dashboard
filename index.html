    <div class="LoginRegisterContainer">
        <div id="blurlayer">
            <div class="formContainer" id="registerForm" style="display: none;">
                <form id="theRegForm">
                    <p></p>
                    <div style="height:50px; display: flex;justify-content: space-between;align-items: center;">
                        <h2>Register</h2>
                        <h2 id="close"
                            style="font-weight: 500; border-radius: 5px; cursor: pointer; padding:0 8px 3px 8px; background-color: #0001;"
                            onclick="closeTab()">
                            x</h2>
                    </div>

                    <p style="color: red;" class="errPlace" id="ErrRegister"></p>

                    <label for="uname">*Name</label>
                    <input type="text" id="uname" name="uname" placeholder="Alison Burgers" />
                    <label for="email">*Email</label>
                    <input type="email" id="email" name="email" placeholder="alison@gmail.com" />

                    <label for="pass">*Password</label>
                    <input type="password" id="pass" name="pass" placeholder="Burgers@50" />

                    <label for="repass">*Re-Enter Password</label>
                    <input type="password" id="repass" name="repass" placeholder="Burgers@50" />

                    <div>
                        <button type="submit">Register</button>
                        <button type="reset">Cancel</button>
                    </div>
                    <label for="pass" onclick="showLogin()"
                        style="text-decoration: 1px solid underline;cursor: pointer;">Login Here</label>
                    <p></p>
                </form>
                <script>
                    const theRegForm = document.querySelector("#theRegForm");
                    const ErrRegister = document.getElementById('ErrRegister')

                    theRegForm.addEventListener("submit", function (e) {
                        e.preventDefault();

                        const name = document.getElementById("uname").value.trim();
                        const email = document.getElementById("email").value.trim();
                        const pass = document.getElementById("pass").value;
                        const repass = document.getElementById("repass").value;


                        if (!name || !email || !pass || !repass) {
                            // alert("All fields are required");
                            ErrRegister.innerText = "All * fields are required";
                            return;
                        }

                        // Name validation
                        if (name.length < 3) {
                            // alert("Name must be at least 3 characters");
                            ErrRegister.innerText = "Name must be at least 3 characters";

                            return;
                        }

                        // Email validation
                        const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
                        if (!email.match(emailPattern)) {
                            // alert("Enter valid email");
                            ErrRegister.innerText = "Enter valid email";
                            return;
                        }

                        // Password validation
                        if (pass.length < 6) {
                            // alert("Password must be at least 6 characters");
                            ErrRegister.innerText = "Password must be at least 6 characters";
                            return;
                        }

                        // Confirm password
                        if (pass !== repass) {
                            // alert("Passwords do not match");
                            ErrRegister.innerText = "Passwords do not match";

                            return;
                        }

                        
                        let msg = DOit.addUser(new User(name, email, pass))

                        // alert(msg);

                        if(msg){
                            ErrRegister.innerHTML = `<p style="color:green;">Register Succesfull</p>`;
                            theRegForm.reset();
                            
                            setTimeout(() => {
                                showLogin()
                                ErrRegister.innerHTML = ``;
                            }, 1000);
                        }else{
                            ErrRegister.innerHTML = `<p style="color:orange;">Email already Exist</p>`;
                            return
                        }

                        
                        // let allUsers = DOit.allUsers()
                        // console.log(allUsers);

                        
                        // console.log(JSON.parse(localStorage.getItem("Users"))); // Output: JohnDoe// Retrieve an item
                        // localStorage.removeItem("Users");
                        // localStorage.clear();

                        // theRegForm.reset();

                        // setTimeout(() => {
                        //     showLogin()
                        // }, 1000);
                    });
                </script>
            </div>

            <div class="formContainer" id="loginForm">
                <form id="theloginForm">

                    <div style="height:50px; display: flex;justify-content: space-between;align-items: center;">

                    <p style="color: red;" class="errPlace" id="Errlogin"></p>

                    <label for="logEmail">*Email</label>

                    <label for="logPass">*Password</label>
                    <input type="password" id="logPass" name="logPass" placeholder="Burgers@50" />

                    <div>

                    </div>
                    <label for="pass" onclick="showReg()"
                        style="text-decoration: 1px solid underline;cursor: pointer;">Register Here</label>
                    <p></p>
                </form>
                <script>
                    const loginForm = document.querySelector("#theloginForm");
                    const Errlogin = document.getElementById('Errlogin') 

                    loginForm.addEventListener("submit", function (e) {
                        e.preventDefault();

                        const email = document.getElementById("logEmail").value.trim();
                        const pass = document.getElementById("logPass").value;

                        if (!email || !pass ) {
                            // alert("All fields are required");
                            Errlogin.innerText = "All * fields are required";
                            return;
                        }


                        // Email validation
                        const emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
                        if (!email.match(emailPattern)) {
                            // alert("Invalid email");
                            Errlogin.innerText = "Invalid email";
                            return;
                        }

                       
                        let msg = DOit.tryLogin(email, pass)

                        if(msg == -1 || msg == undefined){
                            // alert("Invalid Email or Password!")
                            Errlogin.innerHTML = `<p style="color:orange;">Invalid Email or Password!</p>`;
                            return
                        }else if(msg == -2){
                            Errlogin.innerText = "Users not Registered";
                        }
                        else{
                            loginForm.reset();
                            let id = msg;

                            // set coockie
                            document.cookie = `id=${id}; path=/; max-age=7200`; // Expires in 2 hour
                            console.log(document.cookie); // Output: username=JohnDoe
                            // document.cookie = "username=; path=/; max-age=0";

                            // alert('Logged iN')
                            Errlogin.innerHTML = `<p style="color:green;">Login Success</p>`;

                            // greetUser
                            // document.getElementById('greetUser').innerText = `Welcome ${JSON.parse(localStorage.getItem("Users"))[id].uname}`;

                            setTimeout(() => {
                                closeTab()
                                Errlogin.innerHTML = ``;
                                window.location.reload();
                            }, 800);
                        }
                        
                        // localStorage.setItem("Users", JSON.stringify(allUsers) );
                        // console.log(JSON.parse(localStorage.getItem("Users"))); // Output: JohnDoe// Retrieve an item
                        // localStorage.removeItem("Users");
                        // localStorage.clear();
                        
                    });
                </script>

<script>
    let mainOpts = document.getElementById('mainOpts')
    let theTime = document.getElementById("theTime")
    let quotes = document.getElementById("quotes")
    let theWeather = document.getElementById("theWeather")

    let quotesFetching = async () => {
        let response = await fetch('https://quoteslate.vercel.app/api/quotes/random').then(async (data) => await data.json()).then((data) => quotes.innerHTML = `"` + data.quote + `"<p>&nbsp;&nbsp;&nbsp;- ` + data.author + `<p/>`)
    }
    quotesFetching()

    let weatherFetching = async () => {
        let response = await fetch('https://api.open-meteo.com/v1/forecast?latitude=23.022&longitude=72.57&current=temperature_2m').then(async (data) => await data.json()).then((data) => theWeather.innerHTML = `${data.current.temperature_2m} °c`)
    }
    weatherFetching()

    let menubar = () => {
        if (mainOpts.style.display === "flex") {
            mainOpts.style.display = "none"
            mainOpts.classList = "hidden"
        } else {
            mainOpts.style.display = "flex"
            mainOpts.classList = ""
        }
    }

    setInterval(() => {
        let date = new Date()

        let time = date.toLocaleString('en-US', {
            hour: 'numeric',
            minute: 'numeric',
            second: 'numeric',
            hour12: true
        });

        let days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        let dayName = days[date.getDay()];

        let todaysdate = date.getDate().toString().padStart(2, "0") + " / " + (date.getMonth() + 1).toString().padStart(2, "0") + " / " + date.getFullYear();

        theTime.innerHTML = `<p>${dayName} - ${todaysdate}</p><p>${time}</p>`;

    }, 1000);


</script>
